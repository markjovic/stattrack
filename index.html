<!-- stattrack.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#121212">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>StatTrack — Basketball Victoria</title>
<style>
:root {
  --bg: #121212; --surface: #1e1e1e; --elevated: #2a2a2a; --border: #2e2e2e;
  --accent: #00f5d4; --accent-dim: rgba(0,245,212,0.12);
  --text: #ffffff; --text2: #999999; --text3: #555555;
  --win: #4caf50; --loss: #f44336; --draw: #ff9800;
  --c-hidden: #7c4dff; --c-po: #ff6d00; --c-legacy: #555;
  --c-forfeit: #f44336; --c-cx: #795548;
  --rail: 320px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;height:100dvh;overflow:hidden}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
.hidden{display:none!important}

#app{display:flex;height:100dvh}
#rail{width:var(--rail);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#main{flex:1;overflow-y:auto;min-width:0}

.rail-hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.rail-logo{font-size:1.15rem;font-weight:800;letter-spacing:-0.03em;color:var(--accent)}
.rail-logo sup{font-size:0.55rem;font-weight:500;color:var(--text3);letter-spacing:0;margin-left:4px;vertical-align:top;margin-top:4px;display:inline-block}
.rail-ver{font-size:0.65rem;color:var(--text3)}

.stabs{display:flex;padding:6px;gap:3px;border-bottom:1px solid var(--border)}
.stab{flex:1;padding:6px 4px;border-radius:6px;font-size:0.78rem;font-weight:500;color:var(--text2);transition:background 0.12s,color 0.12s}
.stab.on{background:var(--accent-dim);color:var(--accent)}
.stab:hover:not(.on){background:var(--elevated);color:var(--text)}

.panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.swrap{padding:8px;border-bottom:1px solid var(--border)}
.swrap-hdr{display:flex;align-items:center;padding:5px 8px 0;gap:4px}
.swrap-hdr span{font-size:0.72rem;color:var(--text2)}
.rbtn{margin-left:auto;background:none;border:none;color:var(--text3);font-size:0.78rem;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1.2}
.rbtn:hover{background:var(--elevated);color:var(--text1)}
.sinput{width:100%;background:var(--elevated);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:0.88rem;outline:none;transition:border-color 0.15s}
.sinput:focus{border-color:var(--accent)}
.sinput::placeholder{color:var(--text3)}
.sresults{flex:1;overflow-y:auto}
.sseason{padding:7px 8px;border-bottom:1px solid var(--border)}
.sselect{width:100%;background:var(--elevated);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:0.83rem;outline:none;cursor:pointer;appearance:none}
.sselect:focus{border-color:var(--accent)}
.vfilters{padding:6px 8px;border-bottom:1px solid var(--border);display:flex;gap:6px}
.vfilters .sinput{font-size:0.78rem;padding:6px 10px}
.vfilter-date{width:130px;flex-shrink:0}

.ri{padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s}
.ri:hover{background:var(--elevated)}
.ri-name{font-size:0.88rem;font-weight:500}
.ri-sub{font-size:0.73rem;color:var(--text2);margin-top:1px}
.ri-empty{padding:16px 14px;color:var(--text3);font-size:0.83rem}

#view-home{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;padding:20px}
.home-mark{font-size:4rem;font-weight:900;letter-spacing:-0.05em;color:var(--accent);opacity:0.15;line-height:1}
.home-hint{font-size:0.83rem;color:var(--text3);text-align:center}

.vhdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;position:sticky;top:0;background:var(--bg);z-index:10}
.vback{color:var(--accent);font-size:0.83rem;padding:3px 0;white-space:nowrap;flex-shrink:0;margin-top:2px}
.vback:hover{opacity:0.75}
.vtitle{font-size:1.05rem;font-weight:600;line-height:1.3}
.vsub{font-size:0.78rem;color:var(--text2);margin-top:2px}

.avi{width:44px;height:44px;border-radius:50%;background:var(--elevated);border:2px solid var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:0.95rem;font-weight:700;color:var(--accent);flex-shrink:0}

.cstats{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.cstat{flex:1;min-width:56px;padding:11px 6px;text-align:center;border-right:1px solid var(--border)}
.cstat:last-child{border-right:none}
.csv{font-size:1.05rem;font-weight:700;font-variant-numeric:tabular-nums}
.csl{font-size:0.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-top:1px}

.upsec{padding:10px 16px;background:var(--accent-dim);border-bottom:1px solid var(--border)}
.uplbl{font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin-bottom:5px}
.upitem{font-size:0.83rem;padding:2px 0;cursor:pointer;color:var(--accent)}
.upitem:hover{opacity:0.8}

.slist{padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.sec-lbl{font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:2px}
.sc{background:var(--elevated);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.sc-hdr{border-left:3px solid transparent;padding:0;cursor:pointer;display:flex;align-items:center;gap:0;transition:background 0.1s;user-select:none;background:var(--elevated)}
.sc-hdr:hover,.sc-hdr.open{background:#333}
.sc-info{flex:1;min-width:0;padding:7px 12px 6px}
.sc-name{font-size:0.83rem;font-weight:600}
.sc-grade{font-size:0.73rem;color:var(--accent);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-flex;align-items:center;gap:3px}
.sc-grade:hover{opacity:0.8}
.sc-regrade{font-size:0.68rem;color:var(--text3);margin-left:4px}
.gs-wrap{padding:6px 14px 2px}
.gs-org-block{margin-bottom:8px}
.gs-org-name{font-size:0.68rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px}
.gs-ages{display:flex;flex-wrap:wrap;gap:5px}
.gs-pill{display:inline-flex;align-items:center;gap:4px;background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:0.71rem}
.gs-age{color:var(--text2)}
.gs-grd{color:var(--text1);font-weight:700}
.sc-stats{font-size:0.73rem;color:var(--text2);font-variant-numeric:tabular-nums;white-space:nowrap}
.chev{color:var(--text3);font-size:0.65rem;transition:transform 0.2s;flex-shrink:0}
.sc-hdr.open .chev{transform:rotate(90deg)}
.sc-games{display:none;border-top:1px solid var(--border)}
.sc-games.open{display:block}

.grow{display:flex;flex-direction:column;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;border-left:3px solid transparent}
.grow:hover{background:var(--elevated)}
.grow:last-child{border-bottom:none}
.grow.gf{border-left-color:gold}
.grow.sf{border-left-color:silver}
.sc-games .grow{background:#111}
.sc-games .grow:hover{background:#1d1d1d}
.g-row{display:flex;align-items:center}
.g-info{flex:1;padding:7px 12px 6px;min-width:0}
.g-rn{font-size:0.67rem;color:var(--text3);margin-top:1px}
.g-opp{font-size:0.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.sc-srow{display:flex;flex-direction:row;border-top:1px solid var(--border)}
.g-stats{display:flex;flex-direction:row;border-top:1px solid var(--border)}
.g-stats.empty{display:none}
.sc-sm,.g-sm{flex:1;text-align:center;padding:6px 4px;border-right:1px solid var(--border);min-width:0}
.sc-sm:last-child,.g-sm:last-child{border-right:none}
.sc-smv,.g-smv{font-size:0.82rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);display:block}
.sc-sml,.g-sml{font-size:0.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-top:1px}
.rW{background:rgba(76,175,80,0.18);color:var(--win)}
.rL{background:rgba(244,67,54,0.18);color:var(--loss)}
.rD{background:rgba(255,152,0,0.18);color:var(--draw)}
.rU{background:var(--elevated);color:var(--text3)}
.load-row{padding:10px 12px;color:var(--text3);font-size:0.8rem;text-align:center}
.grade-divider{padding:4px 12px;font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);background:var(--elevated);border-bottom:1px solid var(--border)}

.bdg{display:inline-flex;align-items:center;padding:1px 6px;border-radius:3px;font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;flex-shrink:0}
.bH{background:rgba(124,77,255,0.2);color:var(--c-hidden)}
.bPO{background:rgba(255,109,0,0.2);color:var(--c-po)}
.bLG{background:rgba(85,85,85,0.3);color:#777}
.bFF{background:rgba(244,67,54,0.2);color:var(--c-forfeit)}
.bCX{background:rgba(121,85,72,0.3);color:#bcaaa4}
.bNV{background:rgba(85,85,85,0.2);color:var(--text3)}

.vtabs{display:flex;border-bottom:2px solid var(--border);padding:0 14px;gap:0}
.vtab{padding:9px 14px;font-size:0.83rem;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color 0.12s,border-color 0.12s;cursor:pointer}
.vtab.on{color:var(--accent);border-bottom-color:var(--accent)}
.vtab:hover:not(.on){color:var(--text)}
.tpane{display:none}
.tpane.on{display:block}

.rtbl{width:100%;border-collapse:collapse}
.rtbl th{padding:7px 10px;font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);text-align:right;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg)}
.rtbl th:first-child{text-align:left}
.rtbl td{padding:8px 10px;font-size:0.83rem;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums}
.rtbl td:first-child{text-align:left;font-weight:500}
.rtbl tr:hover td{background:var(--elevated);cursor:pointer}

.frow{display:grid;grid-template-columns:2.5rem 1fr auto auto;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background 0.1s;border-left:3px solid transparent}
.frow:hover{background:var(--elevated)}
.frow.gf{border-left-color:gold}
.frow.sf{border-left-color:silver}
.frn{font-size:0.7rem;color:var(--text3)}
.fopp{font-size:0.83rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fdt{font-size:0.7rem;color:var(--text3)}
.fsc{font-size:0.83rem;font-weight:700;font-variant-numeric:tabular-nums;text-align:right}

#sov{position:fixed;inset:0;z-index:100;pointer-events:none}
#sov.open{pointer-events:all}
#sbk{position:absolute;inset:0;background:rgba(0,0,0,.6);opacity:0;transition:opacity .25s}
#sov.open #sbk{opacity:1}
#sht{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);border-radius:12px 12px 0 0;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
#sov.open #sht{transform:translateY(0)}
@media(min-width:769px){#sht{left:auto;right:0;top:0;bottom:0;width:420px;max-height:none;border-radius:0;border-left:1px solid var(--border);border-top:none}}
.shdl{width:34px;height:4px;background:var(--border);border-radius:2px;margin:9px auto 4px}
@media(min-width:769px){.shdl{display:none}}
.shhdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.shttl{font-size:0.83rem;color:var(--text2)}
.shcls{color:var(--text2);font-size:1rem;padding:4px;line-height:1}
.shcls:hover{color:var(--text)}
.sh-inner{padding:0 0 28px}

.gmeta{padding:10px 14px;border-bottom:1px solid var(--border);font-size:0.78rem;color:var(--text2);display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.dot{color:var(--text3)}
.sblock{padding:14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border)}
.tsc{flex:1;text-align:center;min-width:0;padding:6px;border-radius:6px;transition:background 0.15s}
.tsc.mine{background:var(--accent-dim);border:1px solid rgba(0,245,212,0.25)}
.tsc.win .tsc-p{color:var(--win)}
.tsc.win .tsc-n{color:rgba(76,175,80,0.8)}
.tsc-n{font-size:0.75rem;color:var(--text2);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tsc.mine .tsc-n{color:var(--accent)}
.tsc-p{font-size:2.1rem;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-0.04em;line-height:1}
.sdiv{font-size:1.1rem;color:var(--text3);flex-shrink:0}
.qblock{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;gap:0}
.qcol{flex:1;text-align:center}
.qlbl{font-size:0.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px}
.qval{font-size:0.88rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text2);line-height:1.3}
.qval.h{color:var(--text)}
.bsec{padding:0}
.bteam{font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);padding:7px 14px 3px;cursor:pointer}
.bteam:hover{color:var(--accent)}
.btbl{width:100%;border-collapse:collapse}
.btbl th{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);padding:3px 7px;text-align:right;border-bottom:1px solid var(--border)}
.btbl th:first-child{text-align:left;padding-left:14px}
.btbl th:nth-child(2){text-align:left}
.btbl td{padding:6px 7px;font-size:0.8rem;font-variant-numeric:tabular-nums;text-align:right;border-bottom:1px solid var(--border)}
.btbl td:first-child{text-align:left;padding-left:14px;color:var(--text3);font-size:0.72rem;width:1.8rem}
.btbl td:nth-child(2){text-align:left;font-weight:500}
.btbl tr.me td{background:var(--accent-dim)}
.btbl tr.me td:nth-child(2){color:var(--accent);font-weight:700}
.btbl tbody tr:hover td{background:var(--elevated);cursor:pointer}
.btbl tr.me:hover td{background:rgba(0,245,212,0.18)}
.btbl tr:last-child td{border-bottom:none}
.bload{padding:12px 14px;font-size:0.8rem;color:var(--text3)}
.gmode-blk{padding:10px 14px}
.gmode-msg{font-size:0.85rem;color:var(--text2);margin-top:4px;line-height:1.5}
.phq-lnk{display:inline-flex;align-items:center;gap:4px;margin:10px 14px;padding:5px 10px;border-radius:5px;border:1px solid var(--border);font-size:0.78rem;color:var(--text2);transition:border-color 0.12s,color 0.12s}
.phq-lnk:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}

.vcm{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);padding:10px 14px 4px}
.vcal-wrap{display:flex;flex-wrap:wrap;gap:20px 24px;padding:10px 14px}
.vcal-col{min-width:180px;flex:1}
.vcg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:2px 0 8px}
.vcal-jump{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border)}
.vcal-jump label{font-size:0.75rem;color:var(--text2);white-space:nowrap}
.vcal-jump input{flex:1;max-width:160px}
.vcd{text-align:center;font-size:0.6rem;color:var(--text3);padding:3px;font-weight:700}
.vday{text-align:center;padding:7px 2px;border-radius:4px;font-size:0.82rem;cursor:pointer;font-variant-numeric:tabular-nums;background:none;border:none;color:var(--text);transition:background 0.1s}
.vday:hover{background:var(--elevated)}
.vtoday{color:var(--accent);font-weight:700}
.vsel{background:var(--accent-dim);color:var(--accent)}
.vcal-nav{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border)}
.vcal-nav button{padding:4px 10px;border-radius:5px;border:1px solid var(--border);font-size:0.78rem;color:var(--text2);transition:all 0.1s}
.vcal-nav button:hover{background:var(--elevated);color:var(--text)}
.vcal-nav span{flex:1;text-align:center;font-size:0.8rem;color:var(--text2)}
.vgwrap{overflow-x:auto;padding:10px 12px}
.vgtbl{border-collapse:collapse;font-size:0.76rem;min-width:100%}
.vgtbl th{padding:5px 9px;text-align:center;color:var(--text3);font-size:0.65rem;font-weight:700;letter-spacing:0.04em;white-space:nowrap;border-bottom:1px solid var(--border);background:var(--bg)}
.vgtbl th:first-child{text-align:left}
.vgtbl td{padding:4px 6px;border:1px solid var(--border);text-align:center;vertical-align:middle;min-width:110px}
.vgtbl td:first-child{text-align:left;font-size:0.76rem;color:var(--text2);white-space:nowrap;font-weight:500;background:var(--surface);position:sticky;left:0;padding:6px 10px}
.ggame{cursor:pointer;border-radius:3px;padding:3px 4px;transition:background 0.1s;font-size:0.7rem;line-height:1.3}
.ggame:hover{background:var(--elevated)}
.ggame .gt{color:var(--text);font-size:0.72rem;font-weight:500}
.ggame .gc{color:var(--text3);font-size:0.64rem;margin-top:1px}
.ggame .gs{font-weight:600;font-size:0.64rem;color:var(--text3);margin-top:1px}
.ggame.fin .gs{color:var(--win)}
.ggame.up .gs{color:var(--accent)}
.vdate-hdr{padding:8px 14px;font-size:0.78rem;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--surface)}

.orow{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:0.5px solid var(--border);cursor:pointer}
.orow:hover{background:var(--elevated)}
.orow.expanded{background:var(--elevated)}
.oname{flex:1;font-size:0.86rem;color:var(--text)}
.oenc{font-size:0.73rem;color:var(--accent);flex-shrink:0}
.onone{font-size:0.73rem;color:var(--text3);flex-shrink:0}
.opp-detail{border-bottom:0.5px solid var(--border);background:var(--surface-1)}
.opp-opp-row{display:flex;align-items:center;gap:8px;padding:6px 14px 6px 28px;border-bottom:0.5px solid var(--border);cursor:pointer}
.opp-opp-row:hover{background:var(--elevated)}
.opp-opp-name{flex:1;font-size:0.82rem;color:var(--text)}
.opp-opp-enc{font-size:0.72rem;color:var(--accent)}
.opp-game-detail{background:var(--surface-0)}
.opp-game-row{display:flex;align-items:center;gap:10px;padding:5px 14px 5px 42px;border-bottom:0.5px solid var(--border);font-size:0.75rem;color:var(--text2);cursor:pointer}
.opp-game-row:hover{background:var(--elevated)}
.opp-game-date{color:var(--text2);min-width:80px;flex-shrink:0}
.opp-game-grade{flex:1;color:var(--text2)}
.opp-game-score{font-weight:500;min-width:48px;text-align:center;flex-shrink:0}
.opp-game-res{min-width:18px;text-align:center;flex-shrink:0;font-weight:500}
.opp-game-stats{font-size:0.7rem;color:var(--text3);flex-shrink:0}
.sstat{flex:1;text-align:center;padding:6px 4px;border-left:1px solid #2e2e2e;min-width:0;overflow:hidden}
.ssv{font-size:0.75rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden}
.ssl{font-size:0.58rem;color:#555;text-transform:uppercase;letter-spacing:0.04em;margin-top:1px}

.empty{padding:36px 18px;text-align:center;color:var(--text3);font-size:0.85rem}

@media(max-width:768px){
  #app{flex-direction:column}
  #rail{width:100%;flex:1;border-right:none;border-bottom:1px solid var(--border)}
  #rail.mob-hide{display:none!important}

<body>

<div id="app">
  <div id="rail">
    <div class="rail-hd">

<script>

'use strict';
const BASE = 'https://markjovic.github.io/sports-players-stats';
const WRKR = 'https://solitary-snowflake-cb3e.insanoflash.workers.dev';

const S = {
  idx:null, venues:null, teamIdx:null,
  shards:{}, games:{}, players:{}, teamStats:{}, boxes:{}, venueDay:{}, venueDates:{}, dateVenues:{},
  seasonVenueIdx:null, venueSeasonFilter:null, lbData:{}, lbScope:'all', lbStat:'pts', lbMinGP:10,
  playerUuid:null, teamId:null, teamSid:null, venueId:null,
  calOffset:0, // weeks offset from today for venue calendar
};

/* ── Helpers ── */
async function gj(url){
  try{ const r=await fetch(url); return r.ok?await r.json():null; }catch{return null;}
}
const el = id => document.getElementById(id);
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function resetPlayer(){const q=document.getElementById('q-pl');if(q)q.value='';const r=document.getElementById('res-pl');if(r){r.innerHTML='';r.style.display='none';}}
function resetTeam(){const q=document.getElementById('q-tm');if(q)q.value='';const sn=document.getElementById('q-sn');if(sn)sn.selectedIndex=0;const r=document.getElementById('res-tm');if(r)r.innerHTML='';}
function resetVenue(){const q=document.getElementById('q-vn');if(q)q.value='';const vd=document.getElementById('q-vdate');if(vd)vd.value='';const vs=document.getElementById('q-vsn');if(vs)vs.selectedIndex=0;const r=document.getElementById('res-vn');if(r)r.innerHTML='';const ga=document.getElementById('vgrid-area');if(ga)ga.innerHTML='';const cs=document.getElementById('cal-section');if(cs)cs.innerHTML='';}
function resetLB(){const o=document.getElementById('lb-org');if(o)o.value='';const c=document.getElementById('lb-comp');if(c)c.value='';const g=document.getElementById('lb-grade');if(g)g.value='';const a=document.getElementById('lb-age');if(a)a.value='';const gn=document.getElementById('lb-gender');if(gn)gn.value='';const mg=document.getElementById('lb-mingp');if(mg)mg.value='10';renderLB(S.lbData[S.lbScope]?.[S.lbStat]||[],S.lbData[S.lbScope]||{});}
// Recent searches (localStorage)
function getRecent(k){try{return JSON.parse(localStorage.getItem('st_'+k)||'[]');}catch{return[];}}
function addRecent(k,v){if(!v||v.length<2)return;let r=getRecent(k).filter(x=>x!==v);r.unshift(v);localStorage.setItem('st_'+k,JSON.stringify(r.slice(0,8)));}
function showRecent(k,re,onSelect){
  const r=getRecent(k);if(!r.length)return;
  re.innerHTML=`<div class="ri-empty" style="font-size:0.7rem;color:var(--text3);padding:8px 14px 4px">Recent</div>`+
    r.map(v=>`<div class="ri recent-item" data-v="${esc(v)}"><div class="ri-name" style="display:flex;align-items:center;gap:6px"><span style="color:var(--text3)">↩</span>${esc(v)}</div></div>`).join('');
  re.querySelectorAll('.recent-item').forEach(item=>item.addEventListener('click',()=>onSelect(item.dataset.v)));
}

function dayOfWeek(y,m,d){
  // 0=Sun,1=Mon,...,6=Sat
  const t=[0,3,2,5,0,3,5,1,4,6,2,4];
  const yr=m<3?y-1:y;
  return(yr+Math.floor(yr/4)-Math.floor(yr/100)+Math.floor(yr/400)+t[m-1]+d)%7;
}
function fmtDow(d){
  if(!d)return'';
  const[ys,ms,dys]=d.split('-');
  const y=parseInt(ys),m=parseInt(ms),dy=parseInt(dys);
  const dow=dayOfWeek(y,m,dy);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return`${days[dow]} ${dy} ${months[m-1]}`;
}
function fmtD(d){
  if(!d)return'';
  const[,m,dy]=d.split('-');
  return`${parseInt(dy)} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]}`;
}
function avg(p,g){return g?(p/g).toFixed(1):'—';}
function inits(n){if(!n)return'?';const p=n.split(' ').filter(Boolean);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.slice(0,2).toUpperCase();}
function mkDate(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dy=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${dy}`;}
function tokenMatch(str,query){
  const sl=str.toLowerCase();
  return query.toLowerCase().split(/\s+/).filter(Boolean).every(t=>sl.includes(t));
}

function renderMode(g){
  if(g.bye)return'bye';if(g.forfeit)return'forfeit';if(g.cancelled)return'cancelled';if(g.abandoned)return'abandoned';
  if(g.hidden){return g.hp?.length?'hidden-full':'hidden-partial';}
  if(g.profileOnly)return'profileOnly';if(g.legacy)return'legacy';
  if(typeof g.hs==='number')return'normal';return'unknown';
}
function gameCtx(g,tid){
  if(g.h){
    if(g.h===tid)return{myS:g.hs,oppS:g.as,oppN:g.an,oppId:g.a};
    if(g.a===tid)return{myS:g.as,oppS:g.hs,oppN:g.hn,oppId:g.h};
  }
  if(g.t1===tid)return{myS:null,oppS:null,oppN:g.t2n,oppId:g.t2};
  if(g.t2===tid)return{myS:null,oppS:null,oppN:g.t1n,oppId:g.t1};
  return{myS:g.hs,oppS:g.as,oppN:(g.hn||g.t1n||'?'),oppId:null};
}
function resLetter(a,b){
  if(a==null||b==null)return null;
  return a>b?'W':a<b?'L':'D';
}
function storedPts(g,uuid){
  return[...(g.hp||[]),...(g.ap||[])].find(p=>p.profileID===uuid)?.pts??null;
}
function storedStats(g,uuid){
  return[...(g.hp||[]),...(g.ap||[])].find(p=>p.profileID===uuid)||null;
}
function statCell(v,l,last,color){
  return`<div style="flex:1;text-align:center;padding:6px 4px;${last?'':'border-right:1px solid #2e2e2e;'}min-width:0;overflow:hidden"><div style="font-size:0.82rem;font-weight:700;font-variant-numeric:tabular-nums;color:${color||'#fff'};display:block;white-space:nowrap;overflow:hidden">${v}</div><div style="font-size:0.58rem;color:#555;text-transform:uppercase;letter-spacing:0.04em;display:block;margin-top:1px">${l}</div></div>`;
}
function expandSeason(el){const sc=el.closest('.sc');if(sc)toggleGames(sc.querySelector('.sc-hdr'));}
function statRow(items,expandable,spacer){
  const oc=expandable?'onclick="expandSeason(this)" ':'';
  const cs=expandable?'cursor:pointer;':'';
  const sp=spacer?'<div style="flex:1;min-width:0"></div>':'';
  return`<div ${oc}style="${cs}display:flex;flex-direction:row;border-top:1px solid #2e2e2e">${sp}${items.map(([v,l,c],i)=>statCell(v,l,i===items.length-1,c)).join('')}</div>`;
}
function buildGameStatRow(g,ctx,ps){
  const sc=(ctx.myS!=null&&ctx.oppS!=null)?`${ctx.myS}\u2013${ctx.oppS}`:'\u2014';
  const res=resLetter(ctx.myS,ctx.oppS);
  const rc=res==='W'?'#4caf50':res==='L'?'#f44336':res==='D'?'#ff9800':'#555';
  const dot='\u00b7';
  const fg=ps?((ps.pt2??0)+(ps.pt3??0)):dot;
  const cells=[
    [sc,'',null],[res||'?','',rc],
    [ps!=null?(ps.pts??0):dot,'PTS',null],[fg,'FG',null],
    [ps!=null?(ps.pt1??0):dot,'FT',null],[ps!=null?(ps.pt3??0):dot,'3PT',null],
    [ps!=null?(ps.fouls??0):dot,'F',null]];
  return cells.map(([v,l,c],i)=>statCell(v,l,i===cells.length-1,c)).join('');
}
function renderMiniStats(p){
  if(!p)return'';
  const fg=(p.pt2??0)+(p.pt3??0);
  return statRow([[1,'GP'],[p.pts??0,'PTS'],[p.pts??0,'PPG'],[fg,'FG'],[p.pt1??0,'FT'],[p.pt3??0,'3PT'],[p.fouls??0,'FL']]);
}
function finalClass(rn){
  if(!rn)return'';
  const r=rn.toLowerCase();
  if(r.includes('grand final')||r==='gf')return'gf';
  if(r.includes('final')||r.includes('semi')||r.includes('quarter')||r.includes('elimination')||r.includes('preliminary')||r.includes('playoff'))return'sf';
  return'';
}
function sortSeasonsDesc(arr){
  function snYear(sn){
    const sl=sn.match(/(\d{4})\/(\d{2})/);
    if(sl)return parseInt(sl[1].slice(0,2)+sl[2]);
    return parseInt(sn.match(/\d{4}/)?.[0]||'0');
  }
  return[...arr].sort((a,b)=>{
    const ya=snYear(a.sn||''),yb=snYear(b.sn||'');
    if(yb!==ya)return yb-ya;
    const ord={Autumn:3,Winter:2,Summer:1,Spring:1};
    const ka=Object.keys(ord).find(k=>a.sn?.startsWith(k))||'';
    const kb=Object.keys(ord).find(k=>b.sn?.startsWith(k))||'';
    return(ord[kb]||0)-(ord[ka]||0);
  });
}

// Merge regs with same (sid, tid) within a player's season list
function abbreviateGrades(grades){
  if(grades.length<=1)return grades[0]||'';
  const sp=grades.map(g=>g.split(' '));
  let pLen=0;
  outer:for(let i=0;i<sp[0].length;i++){
    for(let j=1;j<sp.length;j++){if(sp[j][i]!==sp[0][i])break outer;}
    pLen=i+1;
  }
  const pre=sp[0].slice(0,pLen).join(' ');
  const suf=sp.map(s=>s.slice(pLen).join(' ')).filter(Boolean);
  if(!pre)return grades.join(' / ');
  return(pre+(suf.length?' '+suf.join(' / '):'')).trim();
}
function gradeAbbrev(gn, allRegGrades){
  // Show only the suffix of gn after stripping common prefix of all reg grades
  if(!gn||allRegGrades.length<=1)return gn||'';
  const sp=allRegGrades.map(g=>g.split(' '));
  let pLen=0;
  outer:for(let i=0;i<sp[0].length;i++){
    for(let j=1;j<sp.length;j++){if(!sp[j][i]||sp[j][i]!==sp[0][i])break outer;}
    pLen=i+1;
  }
  const prefix=sp[0].slice(0,pLen).join(' ');
  const suffix=gn.startsWith(prefix)?gn.slice(prefix.length).trim():gn;
  return suffix||gn;
}
function groupRegs(seasons){
  const result=[];
  for(const sn of sortSeasonsDesc(seasons)){
    const byTid=new Map();
    for(const reg of(sn.regs||[])){
      const tid=reg.tid||'_unknown';
      if(!byTid.has(tid))byTid.set(tid,[]);
      byTid.get(tid).push(reg);
    }
    for(const[tid,regs]of byTid){
      result.push({sn,tid,regs});
    }
  }
  return result;
}

/* ── Navigation / history ── */
function showV(id){
  ['view-home','view-player','view-team','view-venue','view-opp','view-leaders'].forEach(v=>el(v).classList.toggle('hidden',v!==id));
  // Scroll main to top on every view change
  const m=el('main');if(m)m.scrollTop=0;
  // leaders always fullscreen regardless of device; mobile also fullscreen for non-home
  const fullscreen=id==='view-leaders'||window.innerWidth<=768;
  if(fullscreen){
    const home=id==='view-home';
    el('rail').classList.toggle('mob-hide',!home);
    el('main').classList.toggle('mob-show',!home);
  }else{
    el('rail').classList.remove('mob-hide');
    el('main').classList.remove('mob-show');
  }
}
function goHome(){
  history.pushState({type:'home'},'');
  showV('view-home');
}
function navigate(type,data){
  history.pushState({type,...data},'');
}
window.addEventListener('popstate',e=>{
  if(!e.state||e.state.type==='home'){showV('view-home');return;}
  const{type}=e.state;
  if(type==='player'){
    S.playerUuid=e.state.uuid;
    showV('view-player');
    const p=S.players[e.state.uuid];
    if(p)renderPlayer(p);else loadPlayer(e.state.uuid);
  }else if(type==='team'){
    const td=S.teamStats[e.state.sid]?.[e.state.tid];
    if(td){showV('view-team');renderTeam(td,e.state.tid,e.state.sid);}
    else loadTeam(e.state.tid,e.state.sid);
  }else if(type==='venue'){
    loadVenue(e.state.vid,e.state.vname);
  }else if(type==='opp'){
    openOpp(e.state.tid,e.state.sid,e.state.fromUuid);
  }else{showV('view-home');}
});

/* ── Boot ── */
async function boot(){
  history.replaceState({type:'home'},'');
  const[idx,venues]=await Promise.all([gj(BASE+'/data/sports-index.json'),gj(BASE+'/data/venue-index.json')]);
  S.idx=idx; S.venues=venues||[];
  buildSeasonPicker();
  buildVenueList();

// ── Grade snapshot helpers ──────────────────────────────────────────────────

function extractGradeLevel(gn){
  if(!gn)return'?';
  const parts=gn.trim().split(/\s+/);
  const last=parts[parts.length-1];
  if(/^[A-E][1-4]?$/.test(last))return last;
  if(/^[A-E]RES$/i.test(last))return last.toUpperCase();
  if(parts.length>=2){
    const s=parts[parts.length-2];
    if(/^(Grade|Pool|Division|Div)$/i.test(s))return s+' '+last;
  }
  return last;
}

function gradeRank(lv){
  return({'A':10,'A1':11,'A2':12,'A3':13,'B':20,'B1':21,'B2':22,'B3':23,
          'C':30,'C1':31,'C2':32,'D':40,'D1':41,'D2':42,'E':50,'E1':51,
          'ARES':15,'BRES':25,'CRES':35,'DRES':45})[( lv||'').toUpperCase()]??999;
}

function ageNum(a){return parseInt((a||'').replace(/\D/g,''))||999;}

function baseLetter(lv){
  // Extract the base grade letter: BRES→B, B1→B, A→A, Pool 2→Pool 2 (unchanged)
  return(lv||'').replace(/RES$/i,'').replace(/[0-9]+$/,'')[0]||lv||'';
}

function buildGradeSnapshot(seasons){
  const map=new Map();
  for(const sn of seasons){
    const si=S.idx?.seasons?.[sn.sid];
    const org=(si?.orgName||'').trim();
    const comp=(si?.compName||'').trim();
    // Fall back to season name if org not found — shouldn't happen but handles gracefully
    const key=org?(org+(comp?' — '+comp:'')):(sn.sn||sn.sid||'Other');
    if(!map.has(key))map.set(key,new Map());
    const ageMap=map.get(key);
    // Within this season: for each age, track grades by base letter
    // Last reg with a given base letter wins (handles BRES→B or B→BRES correctly)
    const ageSel={}; // age → { baseLetter → { idx, lv } }
    for(let i=0;i<(sn.regs||[]).length;i++){
      const reg=sn.regs[i];
      const age=reg.age||'Open';
      const lv=extractGradeLevel(reg.gn);
      const bl=baseLetter(lv);
      if(!ageSel[age])ageSel[age]={};
      // Always overwrite — later index = more recent = wins
      ageSel[age][bl]={idx:i,lv};
    }
    for(const[age,blMap]of Object.entries(ageSel)){
      if(!ageMap.has(age))ageMap.set(age,new Set());
      for(const{lv}of Object.values(blMap))ageMap.get(age).add(lv);
    }
  }
  return map;
}

function renderGradeSnapshot(seasons){
  const snap=buildGradeSnapshot(seasons);
  if(!snap.size)return'';
  let h='<div class="gs-wrap">';
  for(const[orgKey,ageMap]of snap){
    h+=`<div class="gs-org-block"><div class="gs-org-name">${esc(orgKey)}</div><div class="gs-ages">`;
    const ages=[...ageMap.keys()].sort((a,b)=>ageNum(a)-ageNum(b));
    for(const age of ages){
      const grades=[...ageMap.get(age)].sort((a,b)=>gradeRank(a)-gradeRank(b));
      h+=`<span class="gs-pill"><span class="gs-age">${esc(age)}</span><span class="gs-grd">${grades.map(esc).join(' · ')}</span></span>`;
    }
    h+='</div></div>';
  }
  return h+'</div>';
}

  }
  const sorted=[...nm.values()].sort((a,b)=>{

function dayOfWeekN(y,m,d){const t=[0,3,2,5,0,3,5,1,4,6,2,4];const yr=m<3?y-1:y;return(yr+Math.floor(yr/4)-Math.floor(yr/100)+Math.floor(yr/400)+t[m-1]+d)%7;}
function groupByMonth(dates){const m=new Map();for(const d of dates){const ym=d.slice(0,7);if(!m.has(ym))m.set(ym,[]);m.get(ym).push(d);}return m;}
function calGrid(byMonth,vid,todayStr){
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW='<div class="vcd">M</div><div class="vcd">T</div><div class="vcd">W</div><div class="vcd">T</div><div class="vcd">F</div><div class="vcd">S</div><div class="vcd">S</div>';
  let h='<div class="vcal-wrap">';
  for(const[ym,ds]of byMonth){
    const[y,m]=ym.split('-').map(Number);
    h+=`<div class="vcal-col" id="vcal-m-${y}-${String(m).padStart(2,'0')}"><div class="vcm">${MN[m-1]} ${y}</div><div class="vcg">${DOW}`;
    let prevDay=null;
    for(const d of ds){
      const[,,dyStr]=d.split('-');
      const dy=parseInt(dyStr);
      if(prevDay===null){
        const dow=(dayOfWeekN(y,m,dy)+6)%7;
        for(let i=0;i<dow;i++)h+='<div></div>';
      } else {
        for(let i=0;i<dy-prevDay-1;i++)h+='<div></div>';
      }
      const isSel=d===S.venueSelDate,isToday=d===todayStr;
      h+=`<button class="vday${isToday?' vtoday':''}${isSel?' vsel':''}" data-date="${d}" onclick="selectVenueDate('${esc(vid)}','${d}',this)">${dy}</button>`;
      prevDay=dy;
    }
    h+='</div></div>';
  }
  return h+'</div>';
}
function renderKnownDates(dates,vid,todayStr,pageIdx){
  const byMonth=groupByMonth(dates);
  const months=[...byMonth.keys()];
  if(!months.length)return'<div class="empty">No dates on record.</div>';
  const total=months.length;
  if(pageIdx==null){
    // Find month nearest to today, put it in the middle of the 3-month window
    const todayYM=todayStr?todayStr.slice(0,7):'';
    let nearest=total-1;
    for(let i=0;i<months.length;i++){if(months[i]>=todayYM){nearest=i;break;}}
    pageIdx=Math.max(0,Math.min(nearest-1,total-3)); // nearest as middle
  }
  pageIdx=Math.max(0,Math.min(pageIdx,total-1));
  const visible=months.slice(pageIdx,pageIdx+3);
  const pageMap=new Map(visible.map(m=>[m,byMonth.get(m)]));
  const hasPrev=pageIdx>0;
  const hasNext=pageIdx+3<total;
  // Jump input: find page containing selected month
  const jumpHtml=`<div class="vcal-jump"><label>Jump to:</label><input type="month" class="sinput" oninput="vCalJump('${esc(vid)}','${esc(todayStr||'')}',this.value)"></div>`;
  const nav=`<div class="vcal-nav"><button ${hasPrev?'':'disabled'} onclick="vCalPage('${esc(vid)}','${esc(todayStr||'')}',${Math.max(0,pageIdx-3)})">← Earlier</button><span style="font-size:0.78rem;color:var(--text2)">${visible[0].replace('-',' / ')} – ${visible[visible.length-1].replace('-',' / ')}</span><button ${hasNext?'':'disabled'} onclick="vCalPage('${esc(vid)}','${esc(todayStr||'')}',${Math.min(total-3,pageIdx+3)})">Later →</button></div>`;
  return jumpHtml+nav+calGrid(pageMap,vid,todayStr);
}
function vCalPage(vid,todayStr,pageIdx){
  const dates=S.venueDates[vid]||[];
  const cs=document.getElementById('cal-section');
  if(cs)cs.innerHTML=renderKnownDates(dates,vid,todayStr,pageIdx);
  const ga=document.getElementById('vgrid-area');if(ga)ga.innerHTML='';
}
function vCalJump(vid,todayStr,monthVal){
  if(!monthVal)return;
  const byMonth=groupByMonth(S.venueDates[vid]||[]);
  const months=[...byMonth.keys()];
  // Find the first page that includes this month (or nearest)
  const target=monthVal.slice(0,7);
  let best=Math.max(0,months.length-3);
  for(let i=0;i<months.length;i++){if(months[i]>=target){best=Math.max(0,i-1);break;}}
  vCalPage(vid,todayStr,best);
}
function jumpToMonth(vid,todayStr,monthVal,isKnown){
  if(!monthVal)return;
  if(isKnown){vCalJump(vid,todayStr,monthVal);return;}
  // Range calendar
  const today=mkDate(new Date());
  const[y,m]=monthVal.split('-');
  const target=new Date(parseInt(y),parseInt(m)-1,1);
  const now=new Date();
  const weeksOff=Math.round((target-now)/(7*24*3600*1000));
  S.calOffset=weeksOff;
  const cs=el('cal-section');
  if(cs)cs.innerHTML=renderCalRange(vid,todayStr||today,S.calOffset);
  const ga=el('vgrid-area');if(ga)ga.innerHTML='';
}
function renderCalRange(vid,todayStr,offsetWeeks){
  S.calOffset=offsetWeeks;
  const base=new Date();base.setDate(base.getDate()+offsetWeeks*7-14);
  const dates=[];for(let i=0;i<30;i++){const d=new Date(base);d.setDate(d.getDate()+i);dates.push(mkDate(d));}
  const from=fmtDow(dates[0]),to=fmtDow(dates[dates.length-1]);
  return`<div class="vcal-nav"><button onclick="shiftCal('${esc(vid)}','${esc(todayStr)}',-1)">\u2190 Earlier</button><span>${esc(from)} \u2013 ${esc(to)}</span><button onclick="shiftCal('${esc(vid)}','${esc(todayStr)}',1)">Later \u2192</button></div>
<div class="vcal-jump"><label>Jump to:</label><input type="month" class="sinput" oninput="jumpToMonth('${esc(vid)}','${esc(todayStr)}',this.value)"></div>
${calGrid(groupByMonth(dates),vid,todayStr)}`;
}

function renderVGrid(day,container){

  for(const t of times)h+=`<th>${esc(t)}</th>`;

  for(const c of courts){
    h+=`<tr><td>${esc(c)}</td>`;
    const byT=new Map(day[c].map(g=>[g.t,g]));

      const g=byT.get(t);
      if(g){
        const fin=g.st==='FINAL',up=(g.st==='UPCOMING'||g.st==='PRE_GAME');
        // comp/grade if available in data (future data enhancement)

        h+=`<td><div class="ggame${fin?' fin':up?' up':''}" data-gid="${esc(g.id)}" data-sid="${esc(g.sid||'')}">
          <div class="gt">${esc((g.hn||'?').slice(0,14))} vs ${esc((g.an||'?').slice(0,14))}</div>
          ${compLine}<div class="gs">${esc(g.st||'')}</div></div></td>`;
      }else h+='<td></td>';
    }
    h+='</tr>';
  }
  h+='</tbody></table></div>';
  container.innerHTML+=h;
  container.querySelectorAll('.ggame').forEach(g=>{
    g.addEventListener('click',()=>{

        el('sov').classList.add('open');

}

async function openSheet(gid,sid){

  if(!g){sb.innerHTML='<div class="load-row">Game not found.</div>';return;}
  tt.textContent=g.rn||'Game';
  renderSheet(g,gid,sid,sb);
  if(renderMode(g)==='normal'){
    fetchBox(gid).then(bs=>{if(bs)applyBox(bs,g,gid,sb);});
  }
  // Add opposition history button if both team IDs are known
  const[,,,ht,at]=teamNames?teamNames(g):['','','','',''];
  const htid=g.h||ht,atid=g.a||at;
  if(htid&&atid){
    const histBtn=document.createElement('button');
    histBtn.className='lb-stat';histBtn.style.cssText='margin:8px 14px;font-size:0.72rem';
    histBtn.textContent='⇔ Opposition history';
    histBtn.onclick=()=>{
      closeSheet();
      // Determine which side the current player is on so their team is always "my team"
      const uuid=S.playerUuid;
      const player=uuid?S.players[uuid]:null;
      const playerTid=player?getTidForSeason(player,sid):null;
      const myTid=playerTid===(atid)?atid:htid;
      const oppTid=myTid===htid?atid:htid;
      openTeamOpp(myTid,oppTid,sid,false);
    };
    sb.insertBefore(histBtn,sb.firstChild);
  }
}

function teamNames(g){
  if(g.h)return[g.hn||'',g.an||'',g.h,g.a];
  if(g.t1)return[g.t1n||'',g.t2n||'',g.t1,g.t2];

function renderSheet(g,gid,sid,con){
  const mode=renderMode(g);
  const[t1n,t2n,t1id,t2id]=teamNames(g);
  const uuid=S.playerUuid;
  // Determine which side the player is on
  let mine=null;
  if(uuid&&g.h){if((g.hp||[]).some(p=>p.profileID===uuid)||(S.games[sid]?.games?.[gid]?.h===S.teamId))mine='h';}
  // Simple side detection: check if player's teamId matches
  const myTeamId=S.playerUuid?getPlayerTeamForGame(g,uuid,S.players[uuid]):null;
  const t1mine=myTeamId&&(myTeamId===t1id||mine==='h');
  const t2mine=myTeamId&&(myTeamId===t2id||mine==='a');
  let h='';
  const mp=[];
  if(g.rn)mp.push(esc(g.rn));if(g.d)mp.push(esc(fmtD(g.d)));if(g.t)mp.push(esc(g.t));
  if(g.vn)mp.push(esc(g.vn+(g.ct?' \u00b7 '+g.ct:'')));
  if(mp.length)h+=`<div class="gmeta">${mp.join('<span class="dot"> \u00b7 </span>')}</div>`;

  const t1win=typeof g.hs==='number'&&typeof g.as==='number'&&g.hs>g.as;
  const t2win=typeof g.hs==='number'&&typeof g.as==='number'&&g.as>g.hs;
  const sb=(hs,as,t1,t2,t1m,t2m,div='&ndash;')=>`<div class="sblock">
    <div class="tsc${t1m?' mine':''}${t1win?' win':''}" ${t1id?`style="cursor:pointer" onclick="loadTeam('${esc(t1id)}','${esc(sid)}');closeSheet()"`:''}>
      <div class="tsc-n">${esc(t1)}</div><div class="tsc-p">${hs??'&mdash;'}</div></div>
    <div class="sdiv">${div}</div>
    <div class="tsc${t2m?' mine':''}${t2win?' win':''}" ${t2id?`style="cursor:pointer" onclick="loadTeam('${esc(t2id)}','${esc(sid)}');closeSheet()"`:''}>
      <div class="tsc-n">${esc(t2)}</div><div class="tsc-p">${as??'&mdash;'}</div></div>
  </div>`;

  switch(mode){
    case'normal':
      h+=sb(g.hs,g.as,t1n,t2n,t1mine,t2mine);
      h+=`<div id="qslot"></div>`;
      h+=`<div id="box-slot" class="bload">Loading box score\u2026</div>`;
      break;
    case'hidden-full':
      h+=`<div style="padding:7px 14px"><span class="bdg bH">\ud83d\udfe3 Hidden grade</span></div>`;
      h+=sb(g.hs,g.as,t1n||'Team 1',t2n||'Team 2',t1mine,t2mine);
      if(g.hq?.length)h+=renderQtrs(g.hq,g.aq);
      h+=renderBoxHtml(g.hp||[],g.ap||[],t1n,t2n,t1id,t2id,sid,uuid);
      break;
    case'hidden-partial':
      h+=`<div style="padding:7px 14px"><span class="bdg bH">\ud83d\udfe3 Hidden grade \u2014 limited data</span></div>`;
      h+=sb(g.hs,g.as,t1n||'Team 1',t2n||'Team 2',t1mine,t2mine);
      h+=`<div class="gmode-blk"><div class="gmode-msg">No venue data for hidden grades.</div></div>`;
      break;
    case'profileOnly':
      h+=`<div style="padding:7px 14px"><span class="bdg bPO">\ud83d\udfe0 Historical record</span></div>`;
      h+=sb('&mdash;','&mdash;',t1n,t2n,t1mine,t2mine,'vs');

    case'forfeit':{
      const w=g.fo==='HOME'?t1n:g.fo==='AWAY'?t2n:'';
      h+=`<div style="padding:7px 14px"><span class="bdg bFF">\ud83d\udd34 Forfeit</span></div>`;
      h+=sb(null,null,t1n,t2n,false,false,'vs');
      h+=`<div class="gmode-blk"><div class="gmode-msg">${esc(w?w+' won by forfeit.':'Forfeit.')}</div></div>`;break;}
    case'cancelled':
      h+=`<div style="padding:7px 14px"><span class="bdg bCX">\u2715 Cancelled</span></div>`;
      h+=sb(null,null,t1n,t2n,false,false,'vs');break;
    case'abandoned':
      h+=`<div style="padding:7px 14px"><span class="bdg bCX">\u26a1 Abandoned</span></div>`;
      h+=sb(g.hs,g.as,t1n,t2n,false,false);break;
    case'bye':
      h+=`<div class="gmode-blk"><span class="bdg" style="background:var(--elevated);color:var(--text2)">Bye</span></div>`;break;
    case'legacy':
      h+=`<div style="padding:7px 14px"><span class="bdg bLG">\u2b1c Historical</span></div>`;
      h+=`<div class="gmode-blk"><div class="gmode-msg">${t1n?esc(t1n)+' vs '+esc(t2n||'?'):'Teams unknown'}${g.d?`<br><span style="color:var(--text3)">${esc(fmtD(g.d))}</span>`:''}</div></div>`;break;
    default:
      h+=`<div class="gmode-blk"><div class="gmode-msg">No data available.</div></div>`;
  }
  if(g.noVenue&&!g.vn)h+=`<div style="padding:3px 14px 6px"><span class="bdg bNV">No venue</span></div>`;
  con.innerHTML=h;
}

function getPlayerTeamForGame(g,uuid,player){
  // Check stored box score sides first — most reliable
  if(g.hp?.some(p=>p.profileID===uuid))return g.h||g.t1||null;
  if(g.ap?.some(p=>p.profileID===uuid))return g.a||g.t2||null;
  // Use gameTids map from player file if available (ambiguous players)
  if(player?.gameTids&&g.id&&player.gameTids[g.id])return player.gameTids[g.id];
  return null;
}

function renderQtrs(hq,aq){
  const lbls=['Q1','Q2','Q3','Q4'];
  let h='<div class="qblock">';
  for(let i=0;i<Math.max((hq||[]).length,(aq||[]).length);i++){
    h+=`<div class="qcol"><div class="qlbl">${lbls[i]||'OT'}</div><div class="qval h">${hq?.[i]??'\u2014'}</div><div class="qval">${aq?.[i]??'\u2014'}</div></div>`;
  }
  return h+'</div>';
}

function prow(p,highlight,sid){
  const click=p.profileID?`onclick="closeSheet();loadPlayer('${esc(p.profileID)}')"`:'' ;
  return`<tr class="${highlight?'me':''}" ${click} ${click?'style="cursor:pointer"':''}>
    <td>${esc(String(p.number??''))}</td><td>${esc(p.name)}</td>
    <td>${p.pts??0}</td><td>${p.pt2??0}</td><td>${p.pt3??0}</td><td>${p.pt1??0}</td><td>${p.fouls??0}</td></tr>`;
}
const BTHEAD='<thead><tr><th>#</th><th>Player</th><th>PTS</th><th>2PT</th><th>3PT</th><th>FT</th><th>FL</th></tr></thead>';

function renderBoxHtml(hp,ap,t1n,t2n,t1id,t2id,sid,highlightUuid){
  if(!hp.length&&!ap.length)return'';
  const th=(n,tid)=>tid&&sid
    ?`<div class="bteam" onclick="closeSheet();loadTeam('${esc(tid)}','${esc(sid)}')">${esc(n||'Home')} \u2192</div>`
    :`<div class="bteam">${esc(n||'Home')}</div>`;
  let h='<div class="bsec">';
  if(hp.length)h+=th(t1n,t1id)+`<table class="btbl">${BTHEAD}<tbody>${hp.map(p=>prow(p,p.profileID===highlightUuid,sid)).join('')}</tbody></table>`;
  if(ap.length)h+=th(t2n,t2id)+`<table class="btbl" style="margin-top:4px">${BTHEAD}<tbody>${ap.map(p=>prow(p,p.profileID===highlightUuid,sid)).join('')}</tbody></table>`;
  return h+'</div>';
}

async function fetchBox(gid){
  if(S.boxes[gid])return S.boxes[gid];
  try{
    const r=await fetch(WRKR+'/spectator/'+gid);
    if(!r.ok)return null;
    const d=await r.json();
    if(d.error)return null;
    S.boxes[gid]=d;return d;
  }catch{return null;}
}

function applyBox(bs,g,gid,con){
  // Update quarter slot if available
  const qslot=con.querySelector('#qslot');
  if(qslot&&bs.hq?.length)qslot.outerHTML=renderQtrs(bs.hq,bs.aq);
  // Update box score slot
  const slot=con.querySelector('#box-slot');
  if(!slot)return;
  const[t1n,t2n,t1id,t2id]=teamNames(g);
  const sid=S.teamSid||'';
  const uuid=S.playerUuid;
  if(!bs.h?.length&&!bs.a?.length){slot.textContent='No box score available.';return;}
  slot.outerHTML=renderBoxHtml(bs.h||[],bs.a||[],t1n,t2n,t1id,t2id,sid,uuid);
  // Update game row stats if visible
  if(uuid){
    const allP=[...(bs.h||[]),...(bs.a||[])];
    const mine=allP.find(p=>p.profileID===uuid);
    if(mine){
      const statsEl=document.getElementById('gstats-'+gid);
      if(statsEl){
        const onH=(bs.h||[]).some(p=>p.profileID===uuid);
        const myT=onH?(g.h||g.t1||''):(g.a||g.t2||'');
        statsEl.innerHTML=buildGameStatRow(g,gameCtx(g,myT),mine);
      }
    }
  }
}

/* ── Opposition ── */
async function openOpp(oppTid,sid,fromUuid){
  navigate('opp',{oppTid,sid,fromUuid});
  showV('view-opp');
  const ve=el('view-opp');
  ve.innerHTML='<div class="load-row">Loading…</div>';
  // Load opposing team roster
  if(!S.teamStats[sid]){const d=await gj(BASE+'/team-stats/bv/'+sid+'.json');S.teamStats[sid]=d||{};}
  const td=S.teamStats[sid];
  const oppTeam=td?.[oppTid];
  const oppRoster=Object.keys(oppTeam?.roster||{});
  const oppTeamName=oppTeam?.meta?.name||'Opposing Team';
  // Get current player (should be cached)
  const myPlayer=S.players[fromUuid];
  const myGames=new Set(myPlayer?.games||[]);
  // Build season info for header
  const mySeasonName=(myPlayer?.seasons||[]).find(sn=>sn.sid===sid)?.sn||'';
  // Render shell immediately
  const backBtn=`<button class="vback" onclick="history.back()">←</button>`;
  ve.innerHTML=`<div class="vhdr">${backBtn}<div><div class="vtitle">${esc(myPlayer?.name||'Player')} vs ${esc(oppTeamName)}</div><div class="vsub">${esc(mySeasonName)}</div></div></div><div id="opp-roster"></div>`;
  // Load all opposing player files in parallel
  const oppPlayers=await Promise.all(oppRoster.map(uuid=>loadPlayerFile(uuid)));
  const oppMap={};
  oppRoster.forEach((uuid,i)=>{if(oppPlayers[i])oppMap[uuid]=oppPlayers[i];});
  // Find intersections & resolve games for each opponent
  const rosterEl=document.getElementById('opp-roster');
  if(!rosterEl)return;
  let rh='';
  const resolvers=[];
  for(let i=0;i<oppRoster.length;i++){
    const oppUuid=oppRoster[i];
    const opp=oppMap[oppUuid];
    const shared=(opp?.games||[]).filter(gid=>myGames.has(gid));
    const rowId=`opp-row-${i}`;
    rh+=`<div class="orow" id="${rowId}"><span class="oname">${esc(opp?.name||'#'+oppUuid.slice(0,8))}</span><span class="oenc" id="${rowId}-enc">Checking…</span></div>`;
    resolvers.push({oppUuid,opp,shared,rowId,fromUuid,oppTid,myPlayer});
  }
  rosterEl.innerHTML=rh;
  // Resolve each player's games async, update UI progressively
  for(const r of resolvers){
    resolveOppGames(r,myGames).then(games=>{
      const enc=document.getElementById(r.rowId+'-enc');
      const row=document.getElementById(r.rowId);
      if(!row)return;
      if(!games.length){
        if(enc)enc.outerHTML='<span class="onone">No previous meetings</span>';
      }else{
        if(enc)enc.outerHTML=`<span class="oenc">${games.length} meeting${games.length>1?'s':''}</span>`;
        row.style.cursor='pointer';
        row.onclick=()=>toggleOppGames(row,games,r.opp?.name||'');
      }
    });
  }
}
async function loadPlayerFile(uuid){
  if(S.players[uuid])return S.players[uuid];
  const d=await gj(BASE+'/players/'+uuid.slice(0,2)+'/'+uuid+'.json');
  if(d)S.players[uuid]=d;
  return d||null;
}
function getTidForSeason(player,sid){
  for(const sn of player?.seasons||[]){
    if(sn.sid===sid)return sn.regs?.[0]?.tid??null;
  }
  return null;
}
function getTidsForSeason(player,sid){
  for(const sn of player?.seasons||[]){
    if(sn.sid===sid)return new Set((sn.regs||[]).map(r=>r.tid).filter(Boolean));
  }
  return new Set();
}
function getTidForGame(player,sid,gameId){
  // Use gameTids map (written by fetch-profile-stats from API) when available.
  // Correctly resolves ambiguous players registered to multiple teams same season.
  if(player?.gameTids&&gameId&&player.gameTids[gameId])return player.gameTids[gameId];
  return getTidForSeason(player,sid);
}
async function resolveOppGames(r,myGameSet){
  const{opp,shared,fromUuid,oppTid,myPlayer}=r;
  if(!shared.length)return[];
  // Build gid→sid map from already-cached game files (.games subkey)
  const gidSid={};
  for(const[sid,gf]of Object.entries(S.games||{})){
    for(const gid of Object.keys(gf?.games||{}))gidSid[gid]=sid;
  }
  // For shared gids not yet mapped, load game files lazily
  const unmapped=shared.filter(gid=>!gidSid[gid]);
  if(unmapped.length){
    const sids=[...new Set((myPlayer?.seasons||[]).map(sn=>sn.sid).filter(Boolean))];
    for(const sid of sids){
      if(!unmapped.length)break;
      if(!S.games[sid])S.games[sid]=await gj(BASE+'/games/bv/'+sid+'.json')||{games:{}};
      for(const gid of Object.keys(S.games[sid]?.games||{})){
        if(unmapped.includes(gid))gidSid[gid]=sid;
      }
      unmapped.splice(0,unmapped.length,...unmapped.filter(gid=>!gidSid[gid]));
    }
  }
  // Verify opposing sides and collect game details
  const verified=[];
  for(const gid of shared){
    const sid=gidSid[gid];
    if(!sid)continue;
    const g=S.games[sid]?.games?.[gid];
    if(!g)continue;
    const myTid=getTidForSeason(myPlayer,sid);
    const oppTidInGame=getTidForSeason(opp,sid);
    if(!myTid||!oppTidInGame)continue;
    const valid=(g.h===myTid&&g.a===oppTidInGame)||(g.a===myTid&&g.h===oppTidInGame);
    if(valid)verified.push({gid,sid,g});
  }
  verified.sort((a,b)=>(b.g.d||'').localeCompare(a.g.d||''));
  return verified;
}
function toggleOppGames(row,games,oppName){
  let detail=row.querySelector('.opp-games');
  if(detail){detail.classList.toggle('hidden');return;}
  let gh='<div class="opp-games">';
  for(const{gid,sid,g}of games){
    const ctx=gameCtx(g,getTidForSeason(S.players[row.closest('[data-uuid]')?.dataset?.uuid||''],sid)||g.h);
    const score=ctx.myS!=null?`${ctx.myS}–${ctx.oppS}`:'';
    const res=resLetter(ctx.myS,ctx.oppS);
    const fc=finalClass(g.rn);
    gh+=`<div class="opp-game-row" onclick="openGame('${esc(gid)}',${JSON.stringify(g)},null,'${esc(sid)}')">${esc(g.d?.slice(0,10)||'')} · ${esc(g.gn||'')} · ${esc(score)} <span style="color:${res==='W'?'var(--win)':res==='L'?'var(--loss)':'var(--text2)'}">${res}</span>${fc?` · <span style="color:gold;font-size:0.7rem">${esc(g.rn)}</span>`:''}</div>`;
  }
  gh+='</div>';
  row.insertAdjacentHTML('beforeend',gh);
}
async function openTeamOpp(myTid,oppTid,sid,isUpcoming){
  navigate('opp',{myTid,oppTid,sid});
  showV('view-opp');
  const ve=el('view-opp');
  ve.innerHTML='<div class="load-row">Loading…</div>';
  if(!S.teamStats[sid]){const d=await gj(BASE+'/team-stats/bv/'+sid+'.json');S.teamStats[sid]=d||{};}
  const td=S.teamStats[sid];
  const myTeam=td?.[myTid];const oppTeam=td?.[oppTid];
  const myName=myTeam?.meta?.name||'Team A';const oppName=oppTeam?.meta?.name||'Team B';
  const myRoster=Object.keys(myTeam?.roster||{});
  const oppRoster=Object.keys(oppTeam?.roster||{});
  const backBtn=`<button class="vback" onclick="history.back()">←</button>`;
  const subtitle=isUpcoming?'Upcoming':'Previous meetings';
  ve.innerHTML=`<div class="vhdr">${backBtn}<div><div class="vtitle">${esc(myName)} vs ${esc(oppName)}</div><div class="vsub">${esc(subtitle)}</div></div></div><div id="opp-roster"></div>`;
  // Load all player files for both rosters
  const allUuids=[...new Set([...myRoster,...oppRoster])];
  await Promise.all(allUuids.map(uuid=>loadPlayerFile(uuid)));
  // Build opp game sets
  const oppGameSets={};
  for(const uuid of oppRoster){
    oppGameSets[uuid]=new Set(S.players[uuid]?.games||[]);
  }
  // Render my roster with progressive encounter resolution
  const rosterEl=document.getElementById('opp-roster');
  if(!rosterEl)return;
  let rh='';
  const resolvers=[];
  for(let i=0;i<myRoster.length;i++){
    const uuid=myRoster[i];
    const myP=S.players[uuid];
    const myGames=new Set(myP?.games||[]);
    const rowId=`opp-row-${i}`;
    rh+=`<div class="orow" id="${rowId}" data-uuid="${esc(uuid)}"><span class="oname">${esc(myP?.name||'#'+uuid.slice(0,8))}</span><span class="oenc" id="${rowId}-enc">Checking…</span></div>`;
    // Find which opp players share games
    const encounters=[];
    for(const oppUuid of oppRoster){
      const shared=[...myGames].filter(gid=>oppGameSets[oppUuid].has(gid));
      if(shared.length)encounters.push({oppUuid,shared});
    }
    resolvers.push({uuid,myP,encounters,rowId,myRoster,oppRoster});
  }
  rosterEl.innerHTML=rh;
  for(const r of resolvers){
    resolveTeamOppGames(r).then(result=>{
      const enc=document.getElementById(r.rowId+'-enc');
      const row=document.getElementById(r.rowId);
      if(!row)return;
      const total=result.reduce((s,e)=>s+e.games.length,0);
      if(!total){
        if(enc)enc.outerHTML='<span class="onone">No previous meetings</span>';
      }else{
        const nOpp=result.length;
        const allGames=result.flatMap(e=>e.games);
        const myTidFn=(sid,gid)=>getTidForGame(S.players[r.uuid],sid,gid);
        const wld=wldSummary(allGames,r.uuid,myTidFn);
        if(enc)enc.outerHTML=`<span style="display:flex;align-items:center;gap:8px;flex-shrink:0">${wld}<span class="oenc">${total}G vs ${nOpp}P</span></span>`;
        row.style.cursor='pointer';
        row.onclick=()=>toggleTeamOppDetail(row,result,r.uuid);
      }
    });
  }
}
async function resolveTeamOppGames(r){
  const{myP,encounters}=r;
  const results=[];
  for(const{oppUuid,shared}of encounters){
    const opp=S.players[oppUuid];
    const fakeR={opp,shared,fromUuid:r.uuid,myPlayer:myP};
    const games=await resolveOppGames(fakeR,new Set(myP?.games||[]));
    if(games.length)results.push({oppUuid,opp,games});
  }
  return results;
}
function getPlayerGameStats(g, uuid) {
  // Returns {pts, fg, ft, tp, fouls} for a player from box score data if available
  const sides = [g.hp||[], g.ap||[]];
  for (const side of sides) {
    const p = side.find(p => p.profileID === uuid);
    if (p) return { pts: p.pts??'', fouls: p.fouls??'' };
  }
  return null;
}

function wldSummary(games, myUuid, myTidFn) { // myTidFn(sid,gameId)
  let w = 0, l = 0, d = 0;
  for (const { g, sid } of games) {
    const myTid = myTidFn ? myTidFn(sid,g.id) : g.h;
    const ctx = gameCtx(g, myTid);
    const r = resLetter(ctx.myS, ctx.oppS);
    if (r === 'W') w++;
    else if (r === 'L') l++;
    else if (ctx.myS != null) d++;
  }
  if (!w && !l && !d) return '';
  const parts = [];
  if (w) parts.push(`<span style="color:var(--win)">${w}W</span>`);
  if (l) parts.push(`<span style="color:var(--loss)">${l}L</span>`);
  if (d) parts.push(`<span style="color:var(--draw)">${d}D</span>`);
  return `<span style="font-size:0.7rem;display:flex;gap:4px;flex-shrink:0">${parts.join('')}</span>`;
}

function toggleTeamOppDetail(row, result, myUuid) {
  let detail = row.nextElementSibling;
  if (detail && detail.classList.contains('opp-detail')) {
    detail.classList.toggle('hidden');
    row.classList.toggle('expanded');
    return;
  }
  row.classList.add('expanded');
  const detailEl = document.createElement('div');
  detailEl.className = 'opp-detail';

  for (let ri = 0; ri < result.length; ri++) {
    const { opp, games, oppUuid } = result[ri];
    const oppRow = document.createElement('div');
    oppRow.className = 'opp-opp-row';
    const gameDetailId = `opp-games-${row.id}-${ri}`;
    const myTidFn = (sid,gid) => getTidForGame(S.players[myUuid],sid,gid);
    const wld = wldSummary(games, myUuid, myTidFn);
    oppRow.innerHTML = `<span class="opp-opp-name">${esc(opp?.name||'#'+oppUuid.slice(0,8))}</span>${wld}<span class="opp-opp-enc">${games.length}G</span>`;

    const gameDetail = document.createElement('div');
    gameDetail.className = 'opp-game-detail hidden';
    gameDetail.id = gameDetailId;

    for (const { gid, sid, g } of games) {
      const myTid = getTidForGame(S.players[myUuid],sid,g.id);
      const ctx = gameCtx(g, myTid || g.h);
      const score = ctx.myS != null ? `${ctx.myS}–${ctx.oppS}` : '—';
      const res = resLetter(ctx.myS, ctx.oppS);
      const resColor = res === 'W' ? 'var(--win)' : res === 'L' ? 'var(--loss)' : 'var(--text2)';
      const myStats = getPlayerGameStats(g, myUuid);
      const oppStats = getPlayerGameStats(g, oppUuid);
      const myStr = myStats ? `${myStats.pts}pts ${myStats.fouls}f` : '';
      const oppStr = oppStats ? `${oppStats.pts}pts ${oppStats.fouls}f` : '';
      const fc = finalClass(g.rn);
      const statsSpanId = `opp-gstats-${gid}`;
      const gameRow = document.createElement('div');
      gameRow.className = 'opp-game-row';
      gameRow.innerHTML = `
        <span class="opp-game-date">${esc(g.d?.slice(0,10)||'')}</span>
        <span class="opp-game-grade">${esc(g.gn||'')}${fc?` <span style="color:gold;font-size:0.65rem">${esc(g.rn)}</span>`:''}</span>
        <span class="opp-game-score">${esc(score)}</span>
        <span class="opp-game-res" style="color:${resColor}">${res}</span>
        <span class="opp-game-stats" id="${statsSpanId}">${myStr?`Me: ${myStr}`:''}${myStr&&oppStr?' · ':''}${oppStr?`Them: ${oppStr}`:''}${!myStr&&!oppStr?'Loading…':''}</span>`;
      gameRow.onclick = () => openGame(gid, g, null, sid);

      // Fetch box score and update stats span if not already in game file
      if (!myStr && !oppStr) {
        fetchBox(gid).then(bs => {
          if (!bs) {
            const sp = document.getElementById(statsSpanId);
            if (sp) sp.textContent = '';
            return;
          }
          const allP = [...(bs.h||[]), ...(bs.a||[])];
          const myBs  = allP.find(p => p.profileID === myUuid);
          const oppBs = allP.find(p => p.profileID === oppUuid);
          const myS2  = myBs  ? `${myBs.pts??''}pts ${myBs.fouls??''}f`  : '';
          const oppS2 = oppBs ? `${oppBs.pts??''}pts ${oppBs.fouls??''}f` : '';
          const sp = document.getElementById(statsSpanId);
          if (sp) sp.textContent = `${myS2?`Me: ${myS2}`:''}${myS2&&oppS2?' · ':''}${oppS2?`Them: ${oppS2}`:''}`;
        });
      }
      gameDetail.appendChild(gameRow);
    }

    oppRow.onclick = () => { gameDetail.classList.toggle('hidden'); oppRow.classList.toggle('expanded'); };
    detailEl.appendChild(oppRow);
    detailEl.appendChild(gameDetail);
  }

  row.after(detailEl);
}


async function buildLBSeasonPicker(){

function denormSeason(data){
  if(!data||!data.players)return data;
  const pm=data.players;
  const out={};
  for(const[cat,arr]of Object.entries(data)){
    if(cat==='players'||!Array.isArray(arr))continue;
    out[cat]=arr.map(e=>{
      const m=pm[e.id]||{};
      const uuid=e.id.split('|')[0];
      // Guard: if uuid doesn't look like a UUID, skip this entry
      if(!uuid||uuid.length<8)return null;
      return{uuid,name:m.n||null,club:m.club||null,team:m.team||'',
             org:m.org||'',comp:m.comp||'',grade:m.grade||'',
             age:m.age||'',gender:m.gender||'',gp:m.gp||0,
             foulOuts:m.foulOuts||0,foulOutsPG:m.foulOutsPG||0,
             threePtPG:m.threePtPG||0,foulsPG:m.foulsPG||0,
             finals:m.finals||0,gfApps:m.gfApps||0,gfWins:m.gfWins||0,
             v:e.v};
    }).filter(Boolean);
  }
  return out;
}

function buildGameRow(gid, sid, g, myUuid2, oppUuid2) {

  const resColor2 = res2 === 'W' ? 'var(--win)' : res2 === 'L' ? 'var(--loss)' : 'var(--text2)';

    ${g.vn?`<span style="color:var(--text3);font-size:0.68rem;flex-shrink:0;white-space:nowrap">${esc(g.vn)}</span>`:''}
    <span class="opp-game-score" style="flex-shrink:0">${esc(score2)}</span>

  });
  return row2;
}
async function buildOppStats(uuid, btn) {
  const container = document.getElementById('opp-stats-' + uuid);
  if (!container) return;
  btn.disabled = true;
  btn.textContent = 'Computing…';
  container.innerHTML = '<div style="font-size:0.8rem;color:var(--text3);padding:8px 0">Loading game data…</div>';

  const player = S.players[uuid];
  if (!player) { container.innerHTML = '<div style="font-size:0.8rem;color:var(--text3);padding:8px 0">Player data not available.</div>'; btn.disabled=false; return; }

  // Load all season game files and team-stats (needed to classify g.p[] players by side)
  const sids = [...new Set((player.seasons || []).map(s => s.sid).filter(Boolean))];
  for (const sid of sids) {
    if (!S.games[sid])     S.games[sid]     = await gj(BASE + '/games/bv/' + sid + '.json')     || { games: {} };
    if (!S.teamStats[sid]) S.teamStats[sid]  = await gj(BASE + '/team-stats/bv/' + sid + '.json') || {};
  }

  // For each game the player was in, tally opponents and results
  // g.p[] entries have {id} (UUID string); hp/ap entries have {profileID}
  const oppRecord = {}; // oppUuid → {w, l, d}
  const playerGames = new Set(player.games || []);

  for (const sid of sids) {
    const gamesInSid = S.games[sid]?.games || {};
    const myTid = getTidForGame(player,sid,g?.id);

    for (const [gid, g] of Object.entries(gamesInSid)) {
      if (!playerGames.has(gid)) continue;
      if (!myTid) continue;

      const ctx = gameCtx(g, myTid);
      const res = resLetter(ctx.myS, ctx.oppS);
      if (ctx.myS == null) continue; // no score

      // Determine which side the player is on — skip game if we can't tell
      const isHome = g.h === myTid;
      const isAway = g.a === myTid;
      if (!isHome && !isAway) continue; // myTid doesn't match either side — skip
      const oppSide = isHome ? (g.ap || []) : (g.hp || []);
      const mySide  = isHome ? (g.hp || []) : (g.ap || []);
      let oppUuids;
      if (oppSide.length) {
        // hp/ap present — reliable side information
        oppUuids = oppSide.map(p => p.profileID).filter(Boolean);
      } else if (g.p?.length) {
        // No hp/ap — use g.p with team-stats rosters to determine sides.
        // Team-stats[sid][tid].roster is a map of uuid→stats for each registered player.
        const otherTid = isHome ? g.a : g.h;
        const td = S.teamStats[sid] || {};
        const myRosterSet  = new Set(Object.keys(td[myTid]?.roster  || {}));
        const oppRosterSet = new Set(Object.keys(td[otherTid]?.roster || {}));
        oppUuids = [];
        for (const entry of g.p) {
          const pid = typeof entry === 'string' ? entry : entry.id;
          if (!pid || pid === uuid) continue;
          if (oppRosterSet.has(pid))  { oppUuids.push(pid); continue; }
          // If not in either known roster, fall back to cached player file
          if (myRosterSet.has(pid))   continue; // confirmed teammate
          const cached = S.players[pid];
          if (cached) {
            const pidTid = getTidForSeason(cached, sid);
            if (pidTid === otherTid) oppUuids.push(pid);
          }
          // truly unknown — exclude
        }
      } else {
        continue;
      }

      for (const oppUuid of oppUuids) {
        if (!oppUuid || oppUuid === uuid) continue;
        if (!oppRecord[oppUuid]) oppRecord[oppUuid] = { w: 0, l: 0, d: 0, games: [] };
        if (res === 'W') oppRecord[oppUuid].w++;
        else if (res === 'L') oppRecord[oppUuid].l++;
        else oppRecord[oppUuid].d++;
        oppRecord[oppUuid].games.push({ gid, sid, g });
      }
    }
  }

  const entries = Object.entries(oppRecord)
    .map(([oppUuid, rec]) => {
      const total = rec.w + rec.l + rec.d;
      const winPct = total > 0 ? rec.w / total : 0;
      return { oppUuid, ...rec, total, winPct };
    })
    .filter(e => e.total >= 2);

  if (!entries.length) {
    container.innerHTML = '<div style="font-size:0.8rem;color:var(--text3);padding:8px 0">Not enough scored games vs same opponent (need ≥2).</div>';
    btn.textContent = 'Compute ↗'; btn.disabled = false;
    return;
  }

  // Store game data keyed by oppUuid for expandable rows
  const oppGames = {};
  for (const e of entries) oppGames[e.oppUuid] = e.games || [];
  S._oppStatGames = S._oppStatGames || {};
  S._oppStatGames[uuid] = oppGames;

  entries.sort((a, b) => b.winPct - a.winPct || b.total - a.total);
  const best  = entries.slice(0, 5);
  const worst = entries.slice(-5).reverse();

  function wldBadge(e) {
    return `<span style="font-size:0.7rem;display:flex;gap:4px;flex-shrink:0">` +
      (e.w ? `<span style="color:var(--win)">${e.w}W</span>` : '') +
      (e.l ? `<span style="color:var(--loss)">${e.l}L</span>` : '') +
      (e.d ? `<span style="color:var(--draw)">${e.d}D</span>` : '') +
      `</span>`;
  }

  function oppRow(e) {
    const pct = Math.round(e.winPct * 100) + '%';
    const rowId = 'osr-' + e.oppUuid;
    const detailId = 'osd-' + e.oppUuid;
    return `<div class="orow" style="cursor:pointer" id="${rowId}" onclick="toggleOppStatGames('${esc(e.oppUuid)}','${esc(uuid)}')">
      <span class="oname" id="oppn-${esc(e.oppUuid)}">#${esc(e.oppUuid.slice(0,8))}</span>
      ${wldBadge(e)}
      <span style="font-size:0.72rem;color:var(--text2);min-width:36px;text-align:right;flex-shrink:0">${pct}</span>
    </div><div id="${detailId}" class="opp-game-detail hidden"></div>`;
  }



  let h = '<div style="font-size:0.75rem;color:var(--text3);padding:6px 0 2px">Best win % (min 2 games)</div>';
  for (const e of best)  h += oppRow(e);
  h += '<div style="font-size:0.75rem;color:var(--text3);padding:10px 0 2px">Worst win % (min 2 games)</div>';
  for (const e of worst) h += oppRow(e);

  // Search dropdown — populated with all opponents once names load
  const searchId = 'opp-search-' + uuid;
  const searchDetailId = 'opp-search-detail-' + uuid;
  h += `<div style="margin-top:12px;border-top:0.5px solid var(--border);padding-top:10px">
    <div style="font-size:0.75rem;color:var(--text3);margin-bottom:6px">Look up any opponent</div>
    <select id="${searchId}" class="sselect">
      <option value="">Loading names\u2026</option>
    </select>
    <div id="${searchDetailId}" class="opp-game-detail hidden" style="margin-top:4px"></div>
  </div>`;

  container.innerHTML = h;
  btn.textContent = 'Refresh \u2197'; btn.disabled = false;

  // Wire search dropdown
  document.getElementById(searchId)?.addEventListener('change', function() {
    const oppUuid = this.value;
    const detail = document.getElementById(searchDetailId);
    if (!detail) return;
    detail.innerHTML = '';
    if (!oppUuid) { detail.classList.add('hidden'); return; }
    detail.classList.remove('hidden');
    const games = (S._oppStatGames?.[uuid]?.[oppUuid] || []).slice().sort((a,b)=>(b.g.d||'').localeCompare(a.g.d||''));
    for (const {gid,sid,g} of games) detail.appendChild(buildGameRow(gid, sid, g, uuid, oppUuid));
  });

  // Load all opponent names progressively then rebuild dropdown
  const nameMap = {};
  const allEntries = [...entries];
  let loaded = 0;

  for (const e of allEntries) {
    nameMap[e.oppUuid] = null; // placeholder
    loadPlayerFile(e.oppUuid).then(opp => {
      const name = opp?.name || null;
      nameMap[e.oppUuid] = name;
      // Update inline spans in best/worst rows
      if (name) document.querySelectorAll('#oppn-' + e.oppUuid).forEach(el => { el.textContent = name; });
      loaded++;
      if (loaded === allEntries.length) {
        // Rebuild dropdown with all names
        const sel = document.getElementById(searchId);
        if (!sel) return;
        const sorted = allEntries
          .map(e => ({ ...e, name: nameMap[e.oppUuid] || ('#' + e.oppUuid.slice(0,8)) }))
          .sort((a,b) => a.name.localeCompare(b.name));
        sel.innerHTML = '<option value="">Select an opponent\u2026</option>' +
          sorted.map(e => {
            const pct = e.total > 0 ? Math.round(e.w/e.total*100)+'%' : '';
            return `<option value="${esc(e.oppUuid)}">${esc(e.name)} \u2014 ${e.w}W ${e.l}L${e.d?` ${e.d}D`:''} ${pct}</option>`;
          }).join('');
      }
    });
  }
}

async function toggleOppStatGames(oppUuid, myUuid) {
  const row = document.getElementById('osr-' + oppUuid);
  const detail = document.getElementById('osd-' + oppUuid);
  if (!detail) return;
  if (detail.children.length) {
    detail.classList.toggle('hidden');
    row.classList.toggle('expanded');
    return;
  }
  const games = S._oppStatGames?.[myUuid]?.[oppUuid] || [];
  if (!games.length) { detail.innerHTML = '<div style="padding:4px 14px 4px 28px;font-size:0.75rem;color:var(--text3)">No game details available.</div>'; detail.classList.remove('hidden'); return; }
  games.sort((a, b) => (b.g.d || '').localeCompare(a.g.d || ''));
  for (const { gid, sid, g } of games) {
    const r = buildGameRow(gid, sid, g, myUuid, oppUuid);
    r.style.paddingLeft = '28px';
    detail.appendChild(r);
  }
  detail.classList.remove('hidden');
  row.classList.add('expanded');
}

</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalinda PS – Interschool Sport Gala Day 1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap');

:root {
  --navy:   #1B3A6B;
  --gold:   #C9973A;
  --gold-lt:#DFB55A;
  --white:  #ffffff;
  --offwhite:#F4F6FB;
  --grey:   #E8ECF4;
  --txt:    #1a1a2e;
  --poolA:  #1565C0;
  --poolB:  #2E7D32;
  --compB:  #E65100;
  --finals: #6A1B9A;
  --highlight-bg: #FFFDE7;
  --highlight-ring: #F5A800;
}

*{ box-sizing:border-box; margin:0; padding:0; }

body {
  font-family:'Barlow', Arial, sans-serif;
  background: var(--offwhite);
  color: var(--txt);
  min-height:100vh;
}

/* ── HEADER ──────────────────────────────── */
.site-header {
  background: var(--navy);
  color: white;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 3px 12px rgba(0,0,0,.35);
}

.header-top {
  display: flex;
  align-items: stretch;
  gap: 14px;
  padding: 0 24px 0 0;
  border-bottom: 3px solid var(--gold);
  background: var(--navy);
}

.logo-wrap {
  background: var(--gold);
  padding: 6px 12px;
  align-self: stretch;
  display: flex;
  align-items: center;
}

.logo-wrap img {
  height: 48px;
  display: block;
  border-radius: 50%;
}

.logo-wrap .fallback-logo {
  display:none;
  background: var(--gold);
  color: var(--navy);
  font-family:'Barlow Condensed', sans-serif;
  font-weight:900;
  font-size:22px;
  padding:6px 14px;
  border-radius:6px;
  letter-spacing:1px;
}

.header-footy {
  margin-left: auto;
  display: flex;
  align-items: center;
  padding-right: 8px;
  opacity: 0.92;
}


.title-block h1 {
  font-family:'Barlow Condensed', sans-serif;
  font-weight:900;
  font-size:clamp(20px,3.5vw,32px);
  letter-spacing:1px;
  line-height:1.1;
  color:var(--white);
}

.title-block h2 {
  font-family:'Barlow Condensed', sans-serif;
  font-weight:700;
  font-size:clamp(13px,2vw,18px);
  color:var(--gold);
  letter-spacing:2px;
  text-transform:uppercase;
}

/* ── FORMAT BAR ──────────────────────────── */
.format-bar {
  background: var(--navy);
  padding: 6px 24px 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  align-items: center;
}

.format-pill {
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  color: rgba(255,255,255,0.85);
}

.format-pill .icon { font-size:16px; }

.format-pill strong { color:var(--gold-lt); }

.rules-link {
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  color:var(--gold-lt);
  text-decoration:none;
  border:1px solid var(--gold);
  border-radius:20px;
  padding:3px 12px;
  transition:background .2s;
}

.rules-link:hover { background:rgba(245,168,0,.15); }

/* ── CONTROLS ────────────────────────────── */
.controls-bar {
  background: white;
  border-bottom: 1px solid var(--grey);
  padding: 10px 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.controls-bar span {
  font-size:13px;
  font-weight:600;
  color:#666;
  margin-right:4px;
}

.btn {
  border: none;
  cursor: pointer;
  font-family:'Barlow', sans-serif;
  font-weight:600;
  font-size:13px;
  border-radius:20px;
  padding:7px 16px;
  transition:all .2s;
}

.btn-kalA  { background:#1565C0; color:white; }
.btn-kalB  { background:#E65100; color:white; }
.btn-all   { background:var(--navy); color:white; }
.btn-clear { background:var(--grey); color:var(--txt); }
.btn:hover { opacity:.85; transform:translateY(-1px); }

.legend {
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-left:auto;
}

.legend-item {
  display:flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  color:#444;
}

.swatch {
  width:12px; height:12px; border-radius:3px; flex-shrink:0;
}

/* ── TIMELINE ────────────────────────────── */
.timeline {
  max-width:1500px;
  margin:0 auto;
  padding:20px 20px 40px;
}

/* ── TIME BLOCK ──────────────────────────── */
.time-block {
  margin-bottom: 16px;
}

.time-row {
  display: flex;
  align-items: stretch;
  gap: 0;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

/* left time stamp column */
.time-stamp {
  background: var(--navy);
  color: white;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:18px;
  writing-mode: vertical-lr;
  transform: rotate(180deg);
  text-align:center;
  padding: 16px 8px;
  min-width:44px;
  letter-spacing:1px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

/* oval columns container */
.oval-columns {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  flex:1;
  background: var(--grey);
  gap: 2px;
}

/* individual oval cell */
.oval-cell {
  background: var(--white);
  padding: 0;
  display:flex;
  flex-direction:column;
}

.oval-label {
  background: var(--grey);
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#777;
  padding:5px 14px;
  border-bottom:1px solid #e0e0e0;
}

.oval-cell.empty .fixture-card {
  background:transparent;
  box-shadow:none;
}

/* fixture card */
.fixture-card {
  flex:1;
  padding:12px 14px;
  border-left: 5px solid #ccc;
  transition: all .25s;
  cursor:default;
  background:white;
}

.fixture-card.poolA { border-color: var(--poolA); }
.fixture-card.poolB { border-color: var(--poolB); }
.fixture-card.compB { border-color: var(--compB); }
.fixture-card.finals { border-color: var(--finals); background:#F9F0FF; }

.comp-tag {
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-bottom:6px;
}

.comp-tag.poolA { color:var(--poolA); }
.comp-tag.poolB { color:var(--poolB); }
.comp-tag.compB { color:var(--compB); }
.comp-tag.finals { color:var(--finals); }

.teams {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:clamp(15px,1.4vw,19px);
  line-height:1.2;
  color:var(--txt);
}

.vs-word {
  font-size:11px;
  font-weight:500;
  color:#999;
  display:block;
  margin:1px 0;
}

/* highlight state */
.fixture-card.highlight {
  background: var(--highlight-bg) !important;
  border-left-color: var(--highlight-ring) !important;
  box-shadow: inset 0 0 0 3px var(--highlight-ring);
  transform: scale(1.01);
  z-index:2;
  position:relative;
}
.fixture-card.highlight .teams {
  color: #7B4500;
}

/* ── RESPONSIVE ──────────────────────────── */
@media(max-width:900px) {
  .oval-columns { grid-template-columns: repeat(2,1fr); }
}

@media(max-width:600px) {
  .oval-columns { grid-template-columns: 1fr; }
  .time-stamp { writing-mode:horizontal-tb; transform:none; min-width:auto; padding:10px 14px; font-size:15px; }
  .time-row { flex-direction:column; }
  .header-top { padding:10px 14px; }
  .format-bar { padding:6px 14px 10px; }
  .controls-bar { padding:8px 14px; }
  .legend { margin-left:0; width:100%; }
  .rules-link { margin-left:0; }
}

@media print {
  .controls-bar, .format-bar .rules-link { display:none; }
  .site-header { position:relative; }
}
</style>
</head>

    <a class="rules-link" href="https://www.ssv.vic.edu.au/state/Documents/RulesAustralianFootballPrimary.pdf" target="_blank" rel="noopener">
      📋 SSV Rules (PDF)
    </a>
  </div>
</header>

<!-- CONTROLS -->
<div class="controls-bar">
  <span>Highlight Kalinda:</span>
  <button class="btn btn-kalA" onclick="highlight('A')">Kalinda A</button>
  <button class="btn btn-kalB" onclick="highlight('B')">Kalinda B</button>
  <button class="btn btn-all"  onclick="highlight('ALL')">All Kalinda</button>
  <button class="btn btn-clear" onclick="highlight('NONE')">Clear</button>

  <div class="legend">
    <div class="legend-item"><div class="swatch" style="background:var(--poolA)"></div>Comp A Pool A</div>
    <div class="legend-item"><div class="swatch" style="background:var(--poolB)"></div>Comp A Pool B</div>
    <div class="legend-item"><div class="swatch" style="background:var(--compB)"></div>Comp B</div>
    <div class="legend-item"><div class="swatch" style="background:var(--finals)"></div>Finals</div>
  </div>
</div>

<!-- TIMELINE -->
<div class="timeline" id="timeline"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
// ovals mapped to names for display
const OVAL_NAMES = {
  "Oval 1": "Oval 1",
  "Oval 2": "Oval 2",
  "Oval 3": "Oval 3",
  "Oval 4": "Oval 4"
};

const fixtures = [
  {time:"10:00 AM", comp:"Comp A — Pool A", cls:"poolA", oval:"Oval 1", home:"Eastwood",       away:"Great Ryrie"},
  {time:"10:00 AM", comp:"Comp A — Pool A", cls:"poolA kalindaA", oval:"Oval 2", home:"Kalinda", away:"Heathmont East"},
  {time:"10:00 AM", comp:"Comp B", cls:"compB kalindaB", oval:"Oval 3", home:"Kalinda", away:"Yarra Valley Grammar"},
  {time:"10:00 AM", comp:"Comp B",   cls:"compB", oval:"Oval 4", home:"Antonio Park",   away:"Wonga Park"},

  {time:"10:20 AM", comp:"Comp A — Pool B", cls:"poolB", oval:"Oval 1", home:"Donvale CC",     away:"Wonga Park"},
  {time:"10:20 AM", comp:"Comp A — Pool B", cls:"poolB", oval:"Oval 2", home:"Antonio Park",   away:"Yarra Valley"},
  {time:"10:20 AM", comp:"Comp B",   cls:"compB", oval:"Oval 3", home:"Croydon Hills A",away:"Heathmont East"},

  {time:"10:40 AM", comp:"Comp A — Pool A", cls:"poolA", oval:"Oval 1", home:"Heathmont East", away:"Eastwood"},
  {time:"10:40 AM", comp:"Comp A — Pool A", cls:"poolA", oval:"Oval 2", home:"Great Ryrie",    away:"Croydon Hills"},
  {time:"10:40 AM", comp:"Comp B",   cls:"compB", oval:"Oval 3", home:"Heathmont East", away:"Antonio Park"},
  {time:"10:40 AM", comp:"Comp B",   cls:"compB kalindaB", oval:"Oval 4", home:"Wonga Park", away:"Kalinda"},

  {time:"11:00 AM", comp:"Comp A — Pool B", cls:"poolB", oval:"Oval 1", home:"Yarra Valley",   away:"Donvale CC"},
  {time:"11:00 AM", comp:"Comp A — Pool B", cls:"poolB", oval:"Oval 2", home:"Wonga Park",     away:"Good Shepherd"},
  {time:"11:00 AM", comp:"Comp B",   cls:"compB", oval:"Oval 3", home:"Yarra Valley Grammar", away:"Croydon Hills B"},

  {time:"11:20 AM", comp:"Comp A — Pool A", cls:"poolA", oval:"Oval 1", home:"Croydon Hills",  away:"Heathmont East"},
  {time:"11:20 AM", comp:"Comp A — Pool A", cls:"poolA kalindaA", oval:"Oval 2", home:"Eastwood", away:"Kalinda"},
  {time:"11:20 AM", comp:"Comp B",   cls:"compB", oval:"Oval 3", home:"Antonio Park",   away:"Croydon Hills B"},
  {time:"11:20 AM", comp:"Comp B",   cls:"compB", oval:"Oval 4", home:"Croydon Hills A",away:"Yarra Valley Grammar"},

  {time:"11:40 AM", comp:"Comp A — Pool B", cls:"poolB", oval:"Oval 1", home:"Good Shepherd",  away:"Yarra Valley"},
  {time:"11:40 AM", comp:"Comp A — Pool B", cls:"poolB", oval:"Oval 2", home:"Donvale CC",     away:"Antonio Park"},
  {time:"11:40 AM", comp:"Comp B",   cls:"compB", oval:"Oval 3", home:"Heathmont East", away:"Wonga Park"},

  {time:"12:00 PM", comp:"Comp A — Pool A", cls:"poolA kalindaA", oval:"Oval 1", home:"Kalinda", away:"Croydon Hills"},
  {time:"12:00 PM", comp:"Comp A — Pool A", cls:"poolA", oval:"Oval 2", home:"Heathmont East", away:"Great Ryrie"},
  {time:"12:00 PM", comp:"Comp B",   cls:"compB", oval:"Oval 3", home:"Wonga Park",     away:"Croydon Hills A"},
  {time:"12:00 PM", comp:"Comp B",   cls:"compB", oval:"Oval 4", home:"Yarra Valley Grammar", away:"Antonio Park"},

  {time:"12:20 PM", comp:"Comp A — Pool B", cls:"poolB", oval:"Oval 1", home:"Antonio Park",   away:"Good Shepherd"},
  {time:"12:20 PM", comp:"Comp A — Pool B", cls:"poolB", oval:"Oval 2", home:"Yarra Valley",   away:"Wonga Park"},
  {time:"12:20 PM", comp:"Comp B",   cls:"compB kalindaB", oval:"Oval 3", home:"Croydon Hills B", away:"Kalinda"},

  {time:"12:40 PM", comp:"Comp A — Pool A", cls:"poolA kalindaA", oval:"Oval 1", home:"Great Ryrie", away:"Kalinda"},
  {time:"12:40 PM", comp:"Comp A — Pool A", cls:"poolA", oval:"Oval 2", home:"Croydon Hills",  away:"Eastwood"},
  {time:"12:40 PM", comp:"Comp B",   cls:"compB kalindaB", oval:"Oval 3", home:"Croydon Hills A", away:"Kalinda"},
  {time:"12:40 PM", comp:"Comp B",   cls:"compB", oval:"Oval 4", home:"Heathmont East", away:"Croydon Hills B"},

  {time:"1:00 PM",  comp:"Comp A — Pool B", cls:"poolB", oval:"Oval 1", home:"Wonga Park",     away:"Antonio Park"},
  {time:"1:00 PM",  comp:"Comp A — Pool B", cls:"poolB", oval:"Oval 2", home:"Good Shepherd",  away:"Donvale CC"},
  {time:"1:00 PM",  comp:"Comp B",   cls:"compB", oval:"Oval 3", home:"Wonga Park",     away:"Yarra Valley Grammar"},

  {time:"1:20 PM",  comp:"Comp B",   cls:"compB", oval:"Oval 3", home:"Yarra Valley Grammar", away:"Heathmont East"},
  {time:"1:20 PM",  comp:"Comp B",   cls:"compB", oval:"Oval 4", home:"Croydon Hills B",away:"Croydon Hills A"},

  {time:"1:30 PM",  comp:"Comp A — Grand Final", cls:"finals", oval:"Oval 1", home:"1st Pool A",    away:"1st Pool B"},
  {time:"1:30 PM",  comp:"Comp A — 3rd Place", cls:"finals", oval:"Oval 2", home:"2nd Pool A",    away:"2nd Pool B"},

  {time:"1:40 PM",  comp:"Comp B",   cls:"compB kalindaB", oval:"Oval 3", home:"Kalinda", away:"Antonio Park"},
];

// ── BUILD ─────────────────────────────────────────────────────────────
const OVALS = ["Oval 1","Oval 2","Oval 3","Oval 4"];

// Group by time, preserving insertion order
const grouped = {};
fixtures.forEach(f => {
  if(!grouped[f.time]) grouped[f.time] = {};
  grouped[f.time][f.oval] = f;
});

const timeline = document.getElementById('timeline');

Object.entries(grouped).forEach(([time, ovalMap]) => {
  const block = document.createElement('div');
  block.className = 'time-block';

  const cols = OVALS.map(oval => {
    const f = ovalMap[oval];
    if(!f) {
      return ''; // hide empty slots entirely
    }
    const compClass = f.cls.split(' ')[0]; // first class for colour
    const labelHtml = f.label ? `<div class="vs-word" style="color:#6A1B9A;font-weight:700">${f.label}</div>` : '';
    return `
      <div class="oval-cell">
        <div class="oval-label">${OVAL_NAMES[oval] || oval}</div>
        <div class="fixture-card ${f.cls}" data-cls="${f.cls}">
          <div class="comp-tag ${compClass}">${f.comp}</div>
          ${labelHtml}
          <div class="teams">
            ${f.home}<span class="vs-word">vs</span>${f.away}
          </div>
        </div>
      </div>`;
  }).join('');

  block.innerHTML = `
    <div class="time-row">
      <div class="time-stamp">${time}</div>
      <div class="oval-columns">${cols}</div>
    </div>`;

  timeline.appendChild(block);
});

// ── HIGHLIGHT ─────────────────────────────────────────────────────────
function highlight(mode) {
  document.querySelectorAll('.fixture-card').forEach(c => c.classList.remove('highlight'));
  if(mode === 'A')   document.querySelectorAll('[data-cls*="kalindaA"]').forEach(c => c.classList.add('highlight'));
  if(mode === 'B')   document.querySelectorAll('[data-cls*="kalindaB"]').forEach(c => c.classList.add('highlight'));
  if(mode === 'ALL') document.querySelectorAll('[data-cls*="kalinda"]').forEach(c => c.classList.add('highlight'));
}
</script>

</body>
</html>
